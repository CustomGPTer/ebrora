<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="144" height="144" aria-hidden="true">
  <!-- Twemoji-style grinning face placeholder. Single asset shipped in
       Session 5 so the Add Sticker flow can smoke-test end to end before
       Session 6 lands the full Twemoji catalogue (8 categories, fetched
       from a CDN — pending CSP img-src update at that point).
       Same-origin so it loads under default-src 'self' with no CSP changes. -->
  <circle cx="18" cy="18" r="17" fill="#FFCC4D" stroke="#E6B82E" stroke-width="0.5"/>
  <ellipse cx="12.5" cy="14" rx="2" ry="2.6" fill="#664500"/>
  <ellipse cx="23.5" cy="14" rx="2" ry="2.6" fill="#664500"/>
  <path d="M9.5 21 Q18 30 26.5 21" fill="none" stroke="#664500" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
